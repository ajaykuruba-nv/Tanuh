# NeMo AutoModel SFT recipe
# Model: google/gemma-4-E4B-it
# Hardware: 8x H200 (single node)
#
# Run:
# automodel /userhome/home/ekacarecpt/Nemo-AutoModel/Gemma4E4B/gemma4_e4b_it_structuring_qna_sft_h200x8.yaml --nproc-per-node 8
#
# Data status:
# Megatron bin/idx files are available under:
# /userhome/home/ekacarecpt/datasets/sft_dataset/structuring_dataset_with_qna_megatron_binidx

recipe: TrainFinetuneRecipeForNextTokenPrediction

step_scheduler:
 # Stable setup for Gemma4 DTensor issue:
 # keep tensor parallel OFF to avoid mixed Tensor/DTensor runtime error.
 # With 8 GPUs + tp=1 => effective DP replicas = 8.
 # global_batch_size=8 and local_batch_size=1 => grad_accum=1.
 # With ~161,893 train rows, 1 epoch is ~20,237 optimizer steps.
 global_batch_size: 8
 local_batch_size: 1
 ckpt_every_steps: 2000
 val_every_steps: 1000
 max_steps: 20000
 num_epochs: 1

dist_env:
 backend: nccl
 timeout_minutes: 120

rng:
 _target_: nemo_automodel.components.training.rng.StatefulRNG
 seed: 42
 ranked: true

model:
 _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_pretrained
 pretrained_model_name_or_path: /userhome/home/ekacarecpt/models/gemma4_cpt/5pj19ug4/LATEST/model/consolidated
 torch_dtype: bf16
 trust_remote_code: true
 attn_implementation: eager
 freeze_config:
  freeze_embeddings: false
  freeze_vision_tower: true
  freeze_audio_tower: true
  freeze_language_model: false

checkpoint:
 enabled: true
 checkpoint_dir: /userhome/home/ekacarecpt/Nemo-AutoModel/Gemma4E4B/checkpoints/gemma4_e4b_it_structuring_qna_sft
 # Do not resume DCP training state from this CPT checkpoint because it may
 # miss non-text tower keys for this SFT config. Load model weights via
 # model.pretrained_model_name_or_path (local consolidated HF export) instead.
 restore_from: null
 model_save_format: safetensors
 save_consolidated: false

distributed:
 strategy: fsdp2
 # dp_size:none lets AutoModel infer max data parallel replicas from available GPUs.
 dp_size: none
 # TP=1 avoids Gemma4 DTensor compatibility issue in torch.where path.
 tp_size: 1
 cp_size: 1
 sequence_parallel: false
 activation_checkpointing: true

loss_fn:
 _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.llm.column_mapped_text_instruction_dataset.ColumnMappedTextInstructionDataset
  # Generated by prepare_sft_jsonl.py from prompt/label parquet files.
  path_or_dataset_id: /userhome/home/ekacarecpt/datasets/sft_dataset/structuring_dataset_with_qna_jsonl/train.jsonl
  split: train
  tokenizer:
    _target_: nemo_automodel._transformers.auto_tokenizer.NeMoAutoTokenizer.from_pretrained
    pretrained_model_name_or_path: /userhome/home/ekacarecpt/models/gemma4_cpt/5pj19ug4/LATEST/model/consolidated
  seq_length: 4096
  column_mapping:
    question: prompt
    answer: label
  answer_only_loss_mask: true
  padding: do_not_pad
  truncation: longest_first

packed_sequence:
 # Keep packing disabled to reduce peak memory pressure.
 packed_sequence_size: 0

dataloader:
 _target_: torchdata.stateful_dataloader.StatefulDataLoader
 collate_fn: nemo_automodel.components.datasets.utils.default_collater
 shuffle: false

validation_dataset:
 _target_: nemo_automodel.components.datasets.llm.column_mapped_text_instruction_dataset.ColumnMappedTextInstructionDataset
 path_or_dataset_id: /userhome/home/ekacarecpt/datasets/sft_dataset/structuring_dataset_with_qna_jsonl/validation.jsonl
 split: validation
 tokenizer:
  _target_: nemo_automodel._transformers.auto_tokenizer.NeMoAutoTokenizer.from_pretrained
  pretrained_model_name_or_path: /userhome/home/ekacarecpt/models/gemma4_cpt/5pj19ug4/LATEST/model/consolidated
 seq_length: 4096
 column_mapping:
  question: prompt
  answer: label
 answer_only_loss_mask: true
 padding: do_not_pad
 truncation: longest_first

validation_dataloader:
 _target_: torchdata.stateful_dataloader.StatefulDataLoader
 collate_fn: nemo_automodel.components.datasets.utils.default_collater
 shuffle: false

optimizer:
 _target_: torch.optim.AdamW
 lr: 2.0e-5
 weight_decay: 0.01
 betas: [0.9, 0.95]
 eps: 1.0e-8

lr_scheduler:
 lr_decay_style: constant
 min_lr: 2.0e-5
 lr_warmup_steps: 200

wandb:
 project: gemma4-e4b-structuring-qna-sft
 name: gemma4_e4b_it_structuring_qna_sft_h200x8_seq4096
 dir: /userhome/home/ekacarecpt/Nemo-AutoModel/Gemma4E4B/wandb

# Launcher env vars (used by launcher backends; for local runs also export in shell).
env_vars:
 WANDB_API_KEY: ${WANDB_API_KEY,}
